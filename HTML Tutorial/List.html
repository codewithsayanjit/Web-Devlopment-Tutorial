<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>

<body>
    <h1>Unordered List</h1>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
    </ul>

    <h1>Ordered List</h1>
    <ol>
        <li>First</li>
        <li>Second</li>
    </ol>

    <h1>Description List</h1>
    <dl>
        <dt>HTML</dt><br>
        <dd>HyperText Markup Language</dd>
    </dl>
</body>

</html>
