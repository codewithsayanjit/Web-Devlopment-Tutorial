<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Example</title>

</html>
<table border="3">
    <caption>
        Sample Table
    </caption>
    <thead>
        <tr>
            <th>Column 1</th>
            <th colspan="2">Column 2</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td rowspan="2">Rowspan</td>
            <td>Data A</td>
            <td>Data B</td>
        </tr>
        <tr>
            <td>Data C</td>
            <td>Data D</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td>Total</td>
            <td colspan="2">100</td>
        </tr>
    </tfoot>
</table>
</body>

</html>
