<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hacker Terminal</title>

    <style>
        body {
            background-color: #050505;
            color: #00ff33;
            font-family:
                "Fira Code", "Courier New", Courier, Consolas, "Ubuntu Mono",
                monospace;
            font-size: 16px;
            line-height: 1.5;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.2);
            margin-left: 5px;
        }
    </style>
</head>

<body>

    <!-- First message shown on screen -->
    <div>Initializing Hacking...</div>

    <script>

        // Add a new message after a random delay
        const addItem = async (item) => {
            await randomDelay();

            let div = document.createElement("div");
            div.innerHTML = item;

            document.body.append(div);
        };

        // Generate random delay between 1 and 7 seconds
        const randomDelay = () => {
            return new Promise((resolve, reject) => {

                timeout = 1 + 6 * Math.random();

                setTimeout(() => {
                    resolve();
                }, timeout * 1000);
            });
        };

        async function main() {

            // Blink dots on the latest message
            let t = setInterval(() => {

                let last = document.body.getElementsByTagName("div");
                last = last[last.length - 1];

                if (last.innerHTML.endsWith("...")) {
                    last.innerHTML =
                        last.innerHTML.slice(0, last.innerHTML.length - 3);
                }
                else {
                    last.innerHTML = last.innerHTML + ".";
                }

            }, 100);

            // Messages to display
            let text = [
                "Initialized Hacking now reading your data",
                "Reading your Files",
                "Password files Detected",
                "Sending all passwords and personal files to server",
                "Cleaning up",
            ];

            // Show messages one by one
            for (const item of text) {
                await addItem(item);
            }

            await randomDelay();

            // Stop blinking after all messages appear
            clearInterval(t);
        }

        main();

    </script>
    <!-- Quick Understanding
    randomDelay() → creates a random delay between 1–7 seconds using a Promise.
    addItem() → waits for the delay, creates a new <div>, and adds the message to the page.
    setInterval() → makes the dots (...) blink on the latest message.
    text[] → stores all terminal messages.
    for...of + await → displays messages one after another.
    clearInterval(t) → stops the blinking effect when everything is finished. -->

</body>

</html>
