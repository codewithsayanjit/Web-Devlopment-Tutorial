<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .red {
            color: red;
        }
    </style>
</head>

<body>
    <div class="container red bg-green">
        <div class="box" style="display: flex;" data-createdby="Sayanjit" data-conceptby="Dipayan">Hey I am a box</div>
        <div class="box">Hey I am a box</div>
        <script>
            let div = document.createElement("div");
            div.innerHTML = "I have been inserted <b>by Sayanjit</b>"
            div.setAttribute("class", "created");
            document.querySelector(".container").after(div);


            let cont = document.querySelector(".container")
            cont.insertAdjacentHTML("beforebegin", "<b>beforebegin :  Insert HTML immediately Before the element</b>")
            cont.insertAdjacentHTML("afterbegin", "<b>afterbegin : Insert HTML into element at the beginning</b>")
            cont.insertAdjacentHTML("beforeend", "<b>beforeend : Insert HTML into element at the end</b>")
            cont.insertAdjacentHTML("afterend", "<b>afterend : Insert HTML immediately After the element</b>")
        </script>
    </div>
</body>

</html>
