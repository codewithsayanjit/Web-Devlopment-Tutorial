<!-- The Double Trouble: You are tasked with writing a function that doubles each element in an array. However, there's a catch: if the array contains consecutive duplicate elements, only double one of them. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Trouble</title>
</head>

<body>

    <script>
        // Double each element, but skip consecutive duplicates
        function doubleTrouble(arr) {
            let result = [];

            for (let i = 0; i < arr.length; i++) {
                // Skip if current element is same as previous element
                if (i > 0 && arr[i] === arr[i - 1]) continue;
                // Double the element and store it
                result.push(arr[i] * 2);
            }

            return result;
        }

        console.log(doubleTrouble([1, 2, 2, 3]));      // [2, 4, 6]
        console.log(doubleTrouble([4, 4, 4, 5, 5]));   // [8, 10]
    </script>

</body>

</html>
