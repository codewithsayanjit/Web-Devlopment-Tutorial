<!-- The Password Validator: You are building a password validation feature. Create a function that checks if a given password meets the following criteria: at least 8 characters long, contains both uppercase and lowercase letters, and includes at least one digit. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f0f0;
        }

        .login {
            background: rgb(239, 139, 7);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            width: 300px;
        }

        input,
        button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        #msg {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="login">
        <h2>Login</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="validate()">Login</button>
        <p id="msg"></p>
    </div>

    <script>
        // Password check
        function isValidPassword(password) {
            return password.length >= 8 &&
                /[A-Z]/.test(password) &&   // [A-Z] means any capital letter from A to Z.
                /[a-z]/.test(password) &&   // [a-z] means any small letter from a to z
                /\d/.test(password);    // \d means any digit from 0 to 9.
        }

        function validate() {
            let password = document.getElementById("pass").value;
            let msg = document.getElementById("msg");

            if (isValidPassword(password)) {
                msg.textContent = "Valid Password";
                msg.style.color = "green";
            } else {
                msg.textContent = "Min 8 chars, upper, lower & digit required";
                msg.style.color = "red";
            }
        }

    </script>

</body>

</html>
