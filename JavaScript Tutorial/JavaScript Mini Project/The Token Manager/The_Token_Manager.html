<!-- The Token Manager: You are developing a user authentication system, and you need to manage user authentication tokens. Implement a function named setAuthToken that takes an authentication token and sets it in localStorage with an expiration time. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // Save token with expiration time
        function setAuthToken(token, expiresInMinutes) {

            // Calculate expiration timestamp
            const expiryTime = Date.now() + (expiresInMinutes * 60 * 1000); // Date.now() gives the current time in milliseconds.
            // 60 * 1000 converts 1 minute into milliseconds.

            // Store token and expiry together
            const authData = {
                token: token,
                expiry: expiryTime
            };

            // Save in localStorage
            localStorage.setItem("authToken", JSON.stringify(authData));
        }

        // Example usage:
        setAuthToken("abc123xyz", 10); // Expires after 10 minutes
    </script>
</body>

</html>
