<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            text-align: center;
        }

        .box {
            width: 100%;
            height: 200px;
            background-color: lightblue;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        /* Syntax : 
        @media only or not only mediatype and (expression){
            CSS Code ;
        }
        */
        /*Media Query : Applies Style on Small Screen */
        /* Media Query for screens wider than 600px */
        @media only screen and (min-width: 600px) {
            .box {
                background-color: lightgreen;
                font-size: 30px;
            }
        }

        /* Media Query for screens wider than 900px */
        @media only screen and (min-width: 900px) {
            .box {
                background-color: lightcoral;
                font-size: 36px;
            }
        }
    </style>
</head>

<body>
    <h1>Responsive Media Queries Example</h1>
    <div class="box">Resize the browser window to see changes</div>
</body>

</html>
