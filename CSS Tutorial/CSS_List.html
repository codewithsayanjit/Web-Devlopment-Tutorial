<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS List Example</title>
    <style>
        nav ul li {
            /*list-style: circle;*/
            list-style-type: "😁";
            list-style-position: inside;
            background-color: pink;
            border: 1px solid red;
        }
    </style>
</head>

<body>
    <nav>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
</body>

</html>
